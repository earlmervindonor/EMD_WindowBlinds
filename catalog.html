    <style>
        .catalog-section {
            background-color: var(--light-bg);
            /* Reduced padding to give more vertical space to the iframe */
            padding: 30px 0;
            display: flex;
            justify-content: center;
            min-height: 80vh;
        }

        /* Container fix to allow iframe to use full width up to 1200px */
        .catalog-section .container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        iframe {
            width: 100%;
            max-width: 1200px;
            /* Large height for desktop */
            height: 90vh; 
            border: none;
            box-shadow: var(--shadow);
            border-radius: 8px;
            background: #fff;
        }

        /* Responsive height adjustments */
        @media (max-width: 992px) {
            iframe {
                height: 85vh;
            }
        }

        @media (max-width: 768px) {
            .catalog-section {
                padding: 15px 0;
            }
            iframe {
                /* Tall height for mobile so users can actually see the catalog pages */
                height: 80vh; 
            }
        }
    </style>
</head>
