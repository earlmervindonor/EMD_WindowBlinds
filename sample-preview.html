<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="blinds/FAVICON.png">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | EMD Window Blinds</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

    <style>
         .product-header {
            text-align: center;
            padding: 80px 0 40px;
        }
        .product-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--dark);
        }
        .gallery-section {
            padding-bottom: 80px;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .sample-image-box {
            width: 100%;
            height: 300px;
            overflow: hidden;
            border-radius: 4px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .sample-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s ease;
        }
        .service-card:hover .sample-image-box img {
            transform: scale(1.05);
        }

        /* ===== LIGHTBOX STYLES ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            padding-top: 60px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80%;
            animation: zoom 0.3s;
        }

        @keyframes zoom {
            from {transform: scale(0.7);}
            to {transform: scale(1);}
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <div class="container flex-between">
        <ul class="contact-info-list">
            <li><i class="fa-solid fa-phone"></i> 0936 728 0216</li>
            <li><i class="fa-solid fa-envelope"></i> emd.windowblinds@gmail.com</li>
        </ul>
    </div>
</div>

<!-- NAV -->
<nav class="navbar">
    <div class="container nav-flex">
        <div class="logo">
            <img src="blinds/luxury.png" alt="EMD Luxury" class="nav-logo">
        </div>
    </div>
</nav>

<!-- HEADER -->
<header class="product-header">
    <div class="container">
        <h2>Elegant Samples</h2>
        <p>Available only in EMD Window Blinds</p>
    </div>
</header>

<!-- GALLERY -->
<section class="gallery-section">
    <div class="container">
        <div class="gallery-grid">

            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-1.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-2.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-3.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-4.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-5.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-6.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-7.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-8.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-9.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-10.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-11.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-12.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-13.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-14.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-15.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-16.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-17.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-18.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/ivory-19.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/natural-basic-1.jpg"></div></div>
            <div class="service-card"><div class="sample-image-box"><img src="blinds/natural-basic-2.jpg"></div></div>
            

        </div>
    </div>
</section>

<!-- ===== LIGHTBOX ===== -->
<div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<!-- FOOTER -->
<footer class="main-footer">
    <div class="container footer-content">
        <p>&copy; 2026 EMD WINDOW BLINDS</p>
    </div>
</footer>

<!-- SCRIPTS -->
<script>
    // Lightbox
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.querySelector(".close");

    const images = document.querySelectorAll(".sample-image-box img");

    images.forEach(img => {
        img.addEventListener("click", function() {
            modal.style.display = "block";
            modalImg.src = this.src;
        });
    });

    closeBtn.onclick = function() {
        modal.style.display = "none";
    };

    modal.onclick = function(e) {
        if (e.target === modal) {
            modal.style.display = "none";
        }
    };

    // Mobile menu (kept from yours)
    const menuToggle = document.getElementById('mobile-menu');
    const navMenu = document.getElementById('nav-menu');
    if (menuToggle) {
        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('show');
        });
    }

    // Back to top
    let mybutton = document.getElementById("myBtn");
    window.onscroll = function() {
        if (mybutton && (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300)) {
            mybutton.style.display = "flex";
        } else if (mybutton) {
            mybutton.style.display = "none";
        }
    };
    function topFunction() {
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>

</body>
</html>
